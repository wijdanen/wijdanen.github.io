<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffd6ef" />
    <meta
      name="description"
      content="A cute pink website for Wijdane with modern CSS effects and social links."
    />
    <title>💖 Wijdane.com 💖</title>

    <!-- Open Graph / iMessage / social preview -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.wijdane.com/" />
    <meta property="og:title"       content="Wijdane Naamani" />
    <meta property="og:description" content="Welcome to Wijdane's little corner of the internet 🌷" />
    <meta property="og:image"       content="https://www.wijdane.com/images/favicon.webp" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / iMessage fallback -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Wijdane Naamani" />
    <meta name="twitter:description" content="Welcome to Wijdane's little corner of the internet 🌷" />
    <meta name="twitter:image"       content="https://www.wijdane.com/images/favicon.webp" />

    <link rel="icon" type="image/webp" href="/images/favicon.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <ul class="floats" aria-hidden="true">
      <li>🩷</li><li>💕</li><li>🌸</li><li>💗</li>
      <li>🌷</li><li>💖</li><li>✨</li><li>🌸</li>
    </ul>

    <main class="page">
      <section class="hero">
        <div class="avatar">🌷</div>
        <h1 class="name">Wijdane<span class="tld">.com</span></h1>

        <div class="socials" role="group" aria-label="Social links">
          <a
            class="btn btn--linkedin"
            href="https://www.linkedin.com/in/wijdanen/"
            target="_blank"
            rel="noopener noreferrer"
          >
            <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
            LinkedIn
          </a>
          <a
            class="btn btn--instagram"
            href="https://www.instagram.com/wijd.n23/"
            target="_blank"
            rel="noopener noreferrer"
          >
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
            Instagram
          </a>
          <button class="btn btn--contact" id="openContact" type="button" aria-haspopup="dialog">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Contact
          </button>
        </div>
      </section>

      <footer class="footer">
        <p class="copy">© <span id="year"></span> <span class="footer-name">Wijdane Naamani</span> 💗</p>
      </footer>
    </main>

    <!-- contact modal -->
    <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-label="Contact form" hidden>
      <div class="modal">
        <button class="modal-close" id="closeContact" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <h2 class="modal-heading">Contact Me!</h2>
        <p class="modal-email">or email directly: <a href="mailto:wijdane@wijdane.com">wijdane@wijdane.com</a></p>
        <form class="contact-form" id="contactForm" novalidate>
          <div class="field">
            <label for="fname">Your Name</label>
            <input id="fname" name="name" type="text" placeholder="e.g. Mary" required autocomplete="name" />
          </div>
          <div class="field">
            <label for="femail">Your Email</label>
            <input id="femail" name="email" type="email" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="field">
            <label for="fsubject">Subject</label>
            <input id="fsubject" name="subject" type="text" placeholder="what's this about?" required />
          </div>
          <div class="field">
            <label for="fmessage">Your Message</label>
            <textarea id="fmessage" name="message" rows="4" placeholder="your message here!" required></textarea>
          </div>
          <button class="btn btn--submit" type="submit">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Send Message
          </button>
        </form>
      </div>
    </div>

    <!-- toast -->
    <div class="toast" id="toast" aria-live="polite"></div>

    <script src="script.js"></script>
  </body>
</html>
